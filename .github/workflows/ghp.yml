name: GitHub Pages
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      VITE_IO_BRIDGE_URL:
        description: 'Optional bridge URL override for this run (e.g. https://bridge.example.com)'
        required: false
        type: string

#concurrency:
#  group: pages
#  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: office/package-lock.json
      - name: Install dependencies
        working-directory: office
        run: npm ci
      - name: Build
        working-directory: office
        run: npm run build
        env:
          VITE_IO_BRIDGE_URL: ${{ github.event.inputs.VITE_IO_BRIDGE_URL || vars.VITE_IO_BRIDGE_URL }}
          VITE_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: office/dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
